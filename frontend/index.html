<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff" id="theme-color-meta">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/favicon-180.png">
<title>Varieties — Seed Industry Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;0,8..60,800;1,8..60,400&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* =====================================================================
     Design system
     - Typography: Source Serif 4 (editorial) + Inter Tight (meta/UI)
     - Palette: monochrome, with one accent red used sparingly as rule/emphasis
     - Approach: strict hierarchy, generous whitespace, thin rules, no gradients
     ===================================================================== */

  :root[data-theme="light"] {
    --bg:              #fdfcfa;
    --bg-sunken:       #f5f3ef;
    --bg-raised:       #ffffff;
    --text:            #16161a;
    --text-muted:      #555560;
    --text-faded:      #8a8a94;
    --rule:            #16161a;
    --rule-soft:       #d9d7d1;
    --rule-hair:       #e8e6e0;
    --accent:          #a4262c;     /* restrained brick red */
    --accent-hover:    #7a1c22;
    --selection:       rgba(164,38,44,.15);
  }

  :root[data-theme="dark"] {
    --bg:              #0d0d0f;
    --bg-sunken:       #17171a;
    --bg-raised:       #1c1c20;
    --text:            #ececed;
    --text-muted:      #9a9aa0;
    --text-faded:      #6b6b72;
    --rule:            #ececed;
    --rule-soft:       #2c2c31;
    --rule-hair:       #24242a;
    --accent:          #e05a61;
    --accent-hover:    #ef7a80;
    --selection:       rgba(224,90,97,.22);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
    font-size: 17px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overscroll-behavior-y: none;
  }
  ::selection { background: var(--selection); }

  /* Typographic scale */
  .sans {
    font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-feature-settings: "ss01", "cv11";
  }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

  /* =====================================================================
     Page frame
     ===================================================================== */
  .page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* =====================================================================
     Top bar
     ===================================================================== */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid var(--rule-hair);
    font-family: "Inter Tight", sans-serif;
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }
  .topbar-left, .topbar-right {
    display: flex; gap: 20px; align-items: center;
  }
  .topbar .issue {
    font-variant-numeric: tabular-nums;
  }
  .topbar .date {
    font-variant-numeric: tabular-nums;
  }

  .theme-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--rule-soft);
    border-radius: 999px;
    color: var(--text-muted);
    font-size: 10px;
    letter-spacing: .1em;
    transition: border-color .15s, color .15s;
  }
  .theme-toggle:hover { border-color: var(--text); color: var(--text); }
  .theme-toggle svg { width: 12px; height: 12px; }

  /* =====================================================================
     Masthead
     ===================================================================== */
  .masthead {
    padding: 56px 0 28px;
    text-align: center;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  .masthead::before,
  .masthead::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: var(--rule);
  }
  .masthead::before { top: 0; display: none; }
  .masthead::after  { bottom: 4px; }

  .masthead-wordmark {
    font-family: "Source Serif 4", serif;
    font-weight: 800;
    font-size: clamp(56px, 9vw, 112px);
    line-height: .95;
    letter-spacing: -.035em;
    color: var(--text);
    font-optical-sizing: auto;
  }

  .masthead-rule {
    display: flex; align-items: center; justify-content: center;
    gap: 14px;
    margin: 18px auto 0;
    max-width: 680px;
  }
  .masthead-rule .line {
    flex: 1; height: 1px; background: var(--rule-soft);
  }
  .masthead-rule .line.accent { background: var(--accent); max-width: 40px; }
  .masthead-rule .dot {
    width: 4px; height: 4px; background: var(--accent);
    border-radius: 50%;
  }

  .masthead-tagline {
    margin-top: 14px;
    font-style: italic;
    font-size: 17px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* =====================================================================
     Stats strip
     ===================================================================== */
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--rule);
  }
  .stat {
    padding: 18px 24px;
    border-right: 1px solid var(--rule-hair);
    display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-family: "Source Serif 4", serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -.02em;
  }
  .stat-label {
    font-family: "Inter Tight", sans-serif;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* =====================================================================
     Tabs
     ===================================================================== */
  .tabs {
    display: flex;
    gap: 36px;
    padding: 24px 0 0;
    border-bottom: 1px solid var(--rule-hair);
  }
  .tab {
    font-family: "Inter Tight", sans-serif;
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--text-muted);
    padding: 0 0 16px;
    position: relative;
    transition: color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); }
  .tab.active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px;
    background: var(--accent);
  }

  .hidden { display: none !important; }

  /* =====================================================================
     Filters
     ===================================================================== */
  .filters {
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .filter-row {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .filter-label {
    font-family: "Inter Tight", sans-serif;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-faded);
    font-weight: 600;
    min-width: 62px;
  }

  input[type="text"], input[type="date"], select {
    font-family: "Inter Tight", sans-serif;
    font-size: 14px;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--rule-soft);
    border-radius: 0;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  input[type="text"]:focus, input[type="date"]:focus, select:focus {
    border-color: var(--text);
  }
  input[type="text"] { flex: 1; min-width: 260px; }
  input[type="date"] {
    font-variant-numeric: tabular-nums;
    color-scheme: light dark;
  }

  .chips-scroller {
    display: flex; gap: 6px; flex-wrap: wrap; flex: 1;
  }

  .chip {
    font-family: "Inter Tight", sans-serif;
    font-size: 11px;
    letter-spacing: .06em;
    padding: 6px 11px;
    border: 1px solid var(--rule-soft);
    color: var(--text-muted);
    background: transparent;
    transition: all .12s;
    font-weight: 500;
    border-radius: 999px;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--text); color: var(--text); }
  .chip.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .chip.active-accent {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .filter-reset {
    font-family: "Inter Tight", sans-serif;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 6px 0;
    font-weight: 600;
    border-bottom: 1px solid transparent;
  }
  .filter-reset:hover { border-bottom-color: var(--accent); }

  /* =====================================================================
     DIRECTORY — company cards
     ===================================================================== */
  .dir-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 0;
    border-top: 1px solid var(--rule-hair);
    border-left: 1px solid var(--rule-hair);
    margin-bottom: 40px;
  }
  .dir-card {
    background: var(--bg);
    padding: 22px 24px;
    border-right: 1px solid var(--rule-hair);
    border-bottom: 1px solid var(--rule-hair);
    cursor: pointer;
    transition: background .15s;
    position: relative;
    display: flex; flex-direction: column;
    min-height: 180px;
  }
  .dir-card:hover { background: var(--bg-sunken); }
  .dir-card:hover .dir-name { color: var(--accent); }

  .dir-head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    margin-bottom: 8px;
  }
  .dir-name {
    font-family: "Source Serif 4", serif;
    font-weight: 700;
    font-size: 20px;
    line-height: 1.18;
    letter-spacing: -.015em;
    transition: color .15s;
  }
  .dir-country {
    font-family: "Inter Tight", sans-serif;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-faded);
    white-space: nowrap;
    padding-top: 5px;
    font-weight: 500;
  }
  .dir-desc {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-muted);
    margin: 4px 0 14px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .dir-crops {
    display: flex; flex-wrap: wrap; gap: 5px; margin-top: auto;
  }
  .crop-tag {
    font-family: "Inter Tight", sans-serif;
    font-size: 10px;
    letter-spacing: .04em;
    padding: 2px 8px;
    background: var(--bg-sunken);
    color: var(--text-muted);
    border-radius: 2px;
    font-weight: 500;
  }
  .crop-tag.tomato {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .dir-link {
    position: absolute;
    top: 22px; right: 24px;
    font-family: "Inter Tight", sans-serif;
    font-size: 14px;
    color: var(--text-faded);
  }
  .dir-link:hover { color: var(--accent); }

  /* =====================================================================
     NEWS — magazine layout
     ===================================================================== */

  /* Date group heading */
  .date-group {
    display: flex; align-items: baseline; gap: 16px;
    margin: 48px 0 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  .date-group::before {
    content: "";
    position: absolute;
    bottom: -1px; left: 0;
    height: 3px;
    width: 56px;
    background: var(--accent);
  }
  .date-group-label {
    font-family: "Source Serif 4", serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -.02em;
    color: var(--text);
  }
  .date-group-count {
    font-family: "Inter Tight", sans-serif;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-faded);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  /* Magazine grid — 2fr / 1fr / 1fr on first row */
  .mag-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 36px;
    margin-bottom: 32px;
  }
  .mag-grid.single { grid-template-columns: 1fr; max-width: 820px; }
  .mag-grid.two    { grid-template-columns: 1fr 1fr; }

  /* Article card */
  article.mag {
    display: flex; flex-direction: column; gap: 12px;
    cursor: pointer;
    padding-bottom: 24px;
  }
  article.mag:hover .mag-title { color: var(--accent); }

  .mag-img {
    width: 100%; aspect-ratio: 16 / 10; object-fit: cover;
    background: var(--bg-sunken);
    display: block;
    filter: saturate(.92);
  }
  .mag-img-placeholder {
    width: 100%; aspect-ratio: 16 / 10;
    background: var(--bg-sunken);
    display: flex; align-items: center; justify-content: center;
    font-family: "Source Serif 4", serif;
    font-size: 64px;
    font-weight: 300;
    color: var(--rule-soft);
    font-style: italic;
    border: 1px solid var(--rule-hair);
  }

  .mag-kicker {
    font-family: "Inter Tight", sans-serif;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap;
  }
  .mag-kicker .source { color: var(--accent); }
  .mag-kicker .sep {
    width: 1px; height: 10px; background: var(--rule-soft);
  }
  .mag-kicker .date {
    color: var(--text-faded);
    font-variant-numeric: tabular-nums;
    letter-spacing: .08em;
  }

  .mag-title {
    font-family: "Source Serif 4", serif;
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.12;
    color: var(--text);
    transition: color .15s;
  }
  .mag-summary {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.55;
  }

  .mag-tags {
    display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px;
  }
  .mag-tag {
    font-family: "Inter Tight", sans-serif;
    font-size: 10px;
    letter-spacing: .04em;
    padding: 2px 8px;
    color: var(--text-faded);
    background: var(--bg-sunken);
    border-radius: 2px;
    font-weight: 500;
  }
  .mag-tag.region {
    background: transparent;
    border: 1px solid var(--rule-hair);
  }

  /* Size variants */
  article.mag.lead .mag-title { font-size: clamp(28px, 3.4vw, 48px); }
  article.mag.lead .mag-summary { font-size: 17px; }
  article.mag.medium .mag-title { font-size: 22px; }
  article.mag.medium .mag-summary {
    font-size: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Secondary row after the lead block */
  .mag-row-secondary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 36px;
    row-gap: 40px;
    padding-top: 32px;
    border-top: 1px solid var(--rule-hair);
  }
  .mag-row-secondary article.mag .mag-title { font-size: 20px; }
  .mag-row-secondary article.mag .mag-summary {
    font-size: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* =====================================================================
     Pagination
     ===================================================================== */
  .pagination {
    display: flex; justify-content: center; align-items: center; gap: 20px;
    padding: 32px 0 48px;
    border-top: 1px solid var(--rule-hair);
    margin-top: 16px;
  }
  .pagination button {
    font-family: "Inter Tight", sans-serif;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 10px 18px;
    border: 1px solid var(--rule-soft);
    color: var(--text);
    font-weight: 600;
    transition: all .15s;
  }
  .pagination button:disabled { opacity: .3; cursor: not-allowed; }
  .pagination button:not(:disabled):hover {
    background: var(--text); color: var(--bg); border-color: var(--text);
  }
  .page-info {
    font-family: "Inter Tight", sans-serif;
    font-size: 11px;
    letter-spacing: .1em;
    color: var(--text-faded);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  /* =====================================================================
     Loading / empty states
     ===================================================================== */
  .loading, .empty {
    text-align: center;
    padding: 96px 20px;
    color: var(--text-muted);
    font-family: "Source Serif 4", serif;
    font-style: italic;
    font-size: 17px;
  }
  .empty strong {
    display: block;
    font-size: 26px;
    font-style: normal;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: -.01em;
  }

  /* =====================================================================
     Footer
     ===================================================================== */
  footer.colophon {
    margin-top: 40px;
    padding: 28px 0 40px;
    border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    font-family: "Inter Tight", sans-serif;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-faded);
    font-weight: 500;
  }

  /* =====================================================================
     Mobile swiper
     ===================================================================== */
  .mag-phone { display: none; }

  @media (max-width: 760px) {
    .page { padding: 0 18px; }

    .topbar { font-size: 10px; flex-wrap: wrap; gap: 8px 16px; }
    .topbar-left, .topbar-right { gap: 14px; }

    .masthead { padding: 36px 0 20px; }
    .masthead-wordmark { font-size: 64px; }
    .masthead-tagline { font-size: 15px; }

    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat { padding: 14px 18px; }
    .stat:nth-child(1), .stat:nth-child(2) {
      border-bottom: 1px solid var(--rule-hair);
    }
    .stat:nth-child(2) { border-right: none; }
    .stat-num { font-size: 26px; }

    .tabs { gap: 24px; padding-top: 16px; }
    .tab { font-size: 11px; }

    .filter-label { min-width: auto; }
    .chips-scroller {
      overflow-x: auto; flex-wrap: nowrap;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .chips-scroller::-webkit-scrollbar { display: none; }
    .chips-scroller .chip { flex-shrink: 0; }

    .dir-grid { grid-template-columns: 1fr; }

    .date-group { margin-top: 32px; }
    .date-group-label { font-size: 22px; }

    /* hide desktop magazine, show phone swiper */
    .mag-desktop { display: none; }
    .mag-phone { display: block; }

    .swiper {
      position: relative;
      margin: 20px -18px 0;
      height: calc(100vh - 260px);
      min-height: 540px;
      overflow: hidden;
    }
    .swiper-track {
      display: flex;
      height: 100%;
      transition: transform .3s cubic-bezier(.2,.8,.2,1);
      will-change: transform;
    }
    .swiper.dragging .swiper-track { transition: none; }

    .swipe-card {
      flex: 0 0 100%;
      height: 100%;
      padding: 0 18px;
      display: flex; flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .swipe-card .mag-img,
    .swipe-card .mag-img-placeholder {
      width: 100%; aspect-ratio: 16 / 10;
      flex: 0 0 auto;
    }
    .swipe-card .mag-img-placeholder { font-size: 80px; }
    .swipe-card .mag-title {
      font-size: 26px; font-weight: 700;
      letter-spacing: -.02em; line-height: 1.15;
    }
    .swipe-card .mag-summary { font-size: 15px; line-height: 1.55; }

    .swipe-card .read-more {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px;
      font-family: "Inter Tight", sans-serif;
      font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
      align-self: flex-start;
      font-weight: 600;
    }

    .swiper-chrome {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 0;
    }
    .swiper-dots {
      font-family: "Inter Tight", sans-serif;
      font-size: 11px;
      color: var(--text-faded);
      font-variant-numeric: tabular-nums;
      letter-spacing: .08em;
      font-weight: 500;
    }
    .swiper-nav { display: flex; gap: 8px; }
    .swiper-nav button {
      font-family: "Inter Tight", sans-serif;
      font-size: 14px; font-weight: 600;
      width: 38px; height: 38px;
      border: 1px solid var(--rule-soft);
      color: var(--text);
    }
    .swiper-nav button:disabled { opacity: .3; }
    .swiper-nav button:not(:disabled):hover {
      background: var(--text); color: var(--bg); border-color: var(--text);
    }

    .phone-date-strip {
      margin: 20px 0 0;
      display: flex; gap: 6px;
      overflow-x: auto; padding-bottom: 6px;
      scrollbar-width: none;
    }
    .phone-date-strip::-webkit-scrollbar { display: none; }
    .phone-date-strip .chip { flex-shrink: 0; }

    footer.colophon { padding: 24px 0; flex-direction: column; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- ================= Top bar ================= -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="date" id="topbar-date"></span>
    </div>
    <div class="topbar-right">
      <button class="theme-toggle" id="theme-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon-sun" style="display:none;">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon-moon">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <span id="theme-label">Dark</span>
      </button>
    </div>
  </div>

  <!-- ================= Masthead ================= -->
  <header class="masthead">
    <div class="masthead-wordmark">Varieties</div>
    <div class="masthead-rule">
      <div class="line"></div>
      <div class="line accent"></div>
      <div class="dot"></div>
      <div class="line accent"></div>
      <div class="line"></div>
    </div>
    <div class="masthead-tagline">You want that power, don't you, Sasuke</div>
  </header>

  <!-- ================= Stats ================= -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-companies">—</div>
      <div class="stat-label">Companies</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-countries">—</div>
      <div class="stat-label">Countries</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-tomato">—</div>
      <div class="stat-label">Tomato Breeders</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-news">—</div>
      <div class="stat-label">News Items</div>
    </div>
  </div>

  <!-- ================= Tabs ================= -->
  <nav class="tabs">
    <button class="tab" data-tab="companies">Directory</button>
    <button class="tab active" data-tab="news">News Feed</button>
  </nav>

  <!-- ================= Companies ================= -->
  <section id="panel-companies" class="hidden">
    <div class="filters">
      <div class="filter-row">
        <input type="text" id="company-search" placeholder="Search companies, countries, descriptions…">
        <select id="country-filter">
          <option value="">All countries</option>
        </select>
      </div>
      <div class="filter-row">
        <span class="filter-label">Crop</span>
        <div class="chips-scroller">
          <button class="chip company-chip active" data-crop="">All</button>
          <button class="chip company-chip" data-crop="tomato">Tomato</button>
          <button class="chip company-chip" data-crop="pepper">Pepper</button>
          <button class="chip company-chip" data-crop="cucumber">Cucumber</button>
          <button class="chip company-chip" data-crop="melon">Melon</button>

        <span class="filter-label">Source</span>

</div>

<script>
const API = "";

/* ==========================================================
   Theme
========================================================== */
(function initTheme() {
  const stored = localStorage.getItem("varieties.theme");
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  const theme = stored || (prefersDark ? "dark" : "light");
  applyTheme(theme);
})();

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("theme-icon-sun").style.display  = theme === "dark" ? "block" : "none";
  document.getElementById("theme-icon-moon").style.display = theme === "light" ? "block" : "none";
  document.getElementById("theme-label").textContent = theme === "dark" ? "Light" : "Dark";
  const meta = document.getElementById("theme-color-meta");
  if (meta) meta.setAttribute("content", theme === "dark" ? "#0d0d0f" : "#ffffff");
}

document.getElementById("theme-toggle").addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  localStorage.setItem("varieties.theme", next);
  applyTheme(next);
});

/* ==========================================================
   State
========================================================== */
const state = {
  tab: "news",
  companies: { q: "", country: "", crop: "", offset: 0, limit: 40, total: 0 },
  news: {
    q: "", crops: new Set(), regions: new Set(), sources: new Set(),
    dateFrom: "", dateTo: "",
    offset: 0, limit: 40, total: 0,
  },
  facets: { crops: [], regions: [], sources: [] },
};

/* ==========================================================
   Helpers
========================================================== */
const fmtNum = n => (n == null ? "—" : n.toLocaleString());

function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return iso.slice(0, 10);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function el(html) {
  const t = document.createElement("template");
  t.innerHTML = html.trim();
  return t.content.firstChild;
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function letterFor(title) {
  const m = (title || "").trim().match(/[A-Za-z]/);
  return m ? m[0].toUpperCase() : "V";
}

// Header date
document.getElementById("topbar-date").textContent =
  new Date().toLocaleDateString("en-US", {
    weekday: "long", year: "numeric", month: "long", day: "numeric"
  }).toUpperCase();

/* ==========================================================
   Tabs
========================================================== */
document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    state.tab = t.dataset.tab;
    document.getElementById("panel-companies").classList.toggle("hidden", state.tab !== "companies");
    document.getElementById("panel-news").classList.toggle("hidden", state.tab !== "news");
    if (state.tab === "companies" && !document.getElementById("companies-grid").children.length) {
      loadCompanies();
    }
  });
});

/* ==========================================================
   Stats + facets
========================================================== */
async function loadStats() {
  try {
    const s = await fetch(API + "/api/stats").then(r => r.json());
    document.getElementById("stat-companies").textContent = fmtNum(s.companies);
    document.getElementById("stat-countries").textContent = fmtNum(s.countries);
    document.getElementById("stat-tomato").textContent = fmtNum(s.tomato_companies);
    document.getElementById("stat-news").textContent = fmtNum(s.news);
  } catch (e) { console.error(e); }
}

async function loadCompanyCountries() {
  try {
    const all = await fetch(API + "/api/companies?limit=5000").then(r => r.json());
    const countries = [...new Set(all.items.map(i => i.country).filter(Boolean))].sort();
    const sel = document.getElementById("country-filter");
    sel.innerHTML = '<option value="">All countries</option>' +
      countries.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
  } catch (e) { console.error(e); }
}

async function loadFacets() {
  try {
    const f = await fetch(API + "/api/news/meta/facets").then(r => r.json());
    state.facets = f;
    renderChips("crop-chips",   f.crops,   state.news.crops);
    renderChips("region-chips", f.regions, state.news.regions);
    renderChips("source-chips", f.sources, state.news.sources);
  } catch (e) { console.error(e); }
}

function renderChips(containerId, values, activeSet) {
  const c = document.getElementById(containerId);
  c.innerHTML = "";
  if (!values || !values.length) {
    c.innerHTML = '<span style="color: var(--text-faded); font-family: \'Inter Tight\', sans-serif; font-size: 11px; letter-spacing: .05em;">No data yet — run the scraper</span>';
    return;
  }
  const allBtn = el(`<button class="chip ${activeSet.size === 0 ? "active" : ""}">All</button>`);
  allBtn.onclick = () => {
    activeSet.clear();
    c.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
    allBtn.classList.add("active");
    onFiltersChanged();
  };
  c.appendChild(allBtn);
  for (const v of values) {
    const b = el(`<button class="chip ${activeSet.has(v) ? "active" : ""}">${escapeHtml(v)}</button>`);
    b.onclick = () => {
      if (activeSet.has(v)) activeSet.delete(v); else activeSet.add(v);
      b.classList.toggle("active");
      allBtn.classList.toggle("active", activeSet.size === 0);
      onFiltersChanged();
    };
    c.appendChild(b);
  }
}

/* ==========================================================
   Directory
========================================================== */
async function loadCompanies() {
  const grid = document.getElementById("companies-grid");
  grid.innerHTML = '<div class="loading" style="grid-column:1/-1;">Loading the directory…</div>';

  const p = new URLSearchParams();
  if (state.companies.q) p.set("q", state.companies.q);
  if (state.companies.country) p.set("country", state.companies.country);
  if (state.companies.crop) p.set("crop", state.companies.crop);
  p.set("limit", state.companies.limit);
  p.set("offset", state.companies.offset);

  try {
    const data = await fetch(API + "/api/companies?" + p).then(r => r.json());
    state.companies.total = data.total;
    if (!data.items.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1;"><strong>Nothing found</strong>Try a different search or clear the filters.</div>`;
      renderPagination("companies");
      return;
    }
    grid.innerHTML = "";
    for (const c of data.items) {
      const crops = (c.crops || "").split(",").filter(Boolean);
      const cropTags = crops.slice(0, 6).map(cr =>
        `<span class="crop-tag ${cr === 'tomato' ? 'tomato' : ''}">${escapeHtml(cr)}</span>`
      ).join("");
      const link = c.website
        ? `<a class="dir-link" href="${escapeHtml(c.website)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗</a>`
        : "";
      const country = c.country ? `<div class="dir-country">${escapeHtml(c.country)}</div>` : "";
      const desc = c.description ? `<div class="dir-desc">${escapeHtml(c.description)}</div>` : "";
      const card = el(`
        <article class="dir-card">
          <div class="dir-head">
            <div class="dir-name">${escapeHtml(c.name)}</div>
            ${country}
          </div>
          ${desc}
          <div class="dir-crops">${cropTags}</div>
          ${link}
        </article>
      `);
      if (c.website) card.onclick = () => window.open(c.website, "_blank", "noopener");
      grid.appendChild(card);
    }
    renderPagination("companies");
  } catch (e) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;"><strong>Connection error</strong>${escapeHtml(e.message)}</div>`;
  }
}

/* ==========================================================
   News
========================================================== */
const BUCKET_LABELS = {
  today:      "Today",
  yesterday:  "Yesterday",
  this_week:  "This Week",
  this_month: "This Month",
  older:      "Earlier",
};
const BUCKET_ORDER = ["today","yesterday","this_week","this_month","older"];

async function loadNews() {
  const desk  = document.getElementById("news-desktop");
  const phone = document.getElementById("news-phone");
  desk.innerHTML = '<div class="loading">Fetching the latest…</div>';
  phone.innerHTML = "";

  const p = new URLSearchParams();
  if (state.news.q) p.set("q", state.news.q);
  if (state.news.crops.size)   p.set("crops",   [...state.news.crops].join(","));
  if (state.news.regions.size) p.set("regions", [...state.news.regions].join(","));
  if (state.news.sources.size) p.set("sources", [...state.news.sources].join(","));
  if (state.news.dateFrom) p.set("date_from", state.news.dateFrom);
  if (state.news.dateTo)   p.set("date_to",   state.news.dateTo);
  p.set("limit", state.news.limit);
  p.set("offset", state.news.offset);

  try {
    const data = await fetch(API + "/api/news?" + p).then(r => r.json());
    state.news.total = data.total;

    if (!data.items.length) {
      const msg = `<div class="empty"><strong>No stories match</strong>Try loosening your filters, or hit Reset.</div>`;
      desk.innerHTML = msg; phone.innerHTML = msg;
      renderPagination("news");
      return;
    }
    renderDesktopMagazine(data.items, desk);
    renderPhoneSwiper(data.items, phone);
    renderPagination("news");
  } catch (e) {
    desk.innerHTML = `<div class="empty"><strong>Connection error</strong>${escapeHtml(e.message)}</div>`;
  }
}

function groupByBucket(items) {
  const g = {};
  for (const it of items) {
    const b = it.bucket || "older";
    (g[b] = g[b] || []).push(it);
  }
  return g;
}

function renderDesktopMagazine(items, container) {
  container.innerHTML = "";
  const grouped = groupByBucket(items);

  for (const bucket of BUCKET_ORDER) {
    const group = grouped[bucket];
    if (!group || !group.length) continue;

    container.appendChild(el(`
      <div class="date-group">
        <div class="date-group-label">${BUCKET_LABELS[bucket]}</div>
        <div class="date-group-count">${group.length} ${group.length === 1 ? "story" : "stories"}</div>
      </div>
    `));

    const first = group.slice(0, 3);
    const firstGrid = el('<div class="mag-grid"></div>');
    if (first.length === 1) firstGrid.classList.add("single");
    if (first.length === 2) firstGrid.classList.add("two");
    first.forEach((it, i) => firstGrid.appendChild(renderMagCard(it, i === 0 ? "lead" : "medium")));
    container.appendChild(firstGrid);

    const rest = group.slice(3);
    if (rest.length) {
      const secondary = el('<div class="mag-row-secondary"></div>');
      rest.forEach(it => secondary.appendChild(renderMagCard(it, "medium")));
      container.appendChild(secondary);
    }
  }
}

function renderMagCard(item, size) {
  const crops = (item.crops || "").split(",").filter(Boolean);
  const regions = (item.regions || "").split(",").filter(Boolean);
  const tags = [
    ...crops.slice(0, 3).map(c => `<span class="mag-tag">${escapeHtml(c)}</span>`),
    ...regions.slice(0, 2).map(r => `<span class="mag-tag region">${escapeHtml(r)}</span>`),
  ].join("");
  const imgHtml = item.image_url
    ? `<img class="mag-img" src="${escapeHtml(item.image_url)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'mag-img-placeholder\\'>${letterFor(item.title)}</div>'">`
    : `<div class="mag-img-placeholder">${letterFor(item.title)}</div>`;

  const card = el(`
    <article class="mag ${size}">
      ${imgHtml}
      <div class="mag-kicker">
        <span class="source">${escapeHtml(item.source || "")}</span>
        <span class="sep"></span>
        <span class="date">${fmtDate(item.published_at)}</span>
      </div>
      <h3 class="mag-title">${escapeHtml(item.title)}</h3>
      <p class="mag-summary">${escapeHtml(item.summary || "")}</p>
      ${tags ? `<div class="mag-tags">${tags}</div>` : ""}
    </article>
  `);
  card.onclick = () => window.open(item.link, "_blank", "noopener");
  return card;
}

/* ==========================================================
   Phone swiper
========================================================== */
function renderPhoneSwiper(items, container) {
  container.innerHTML = "";
  const grouped = groupByBucket(items);
  const visibleBuckets = BUCKET_ORDER.filter(b => grouped[b] && grouped[b].length);

  const strip = el('<div class="phone-date-strip"></div>');
  for (const b of visibleBuckets) {
    const btn = el(`<button class="chip">${BUCKET_LABELS[b]} · ${grouped[b].length}</button>`);
    btn.onclick = () => {
      const idx = items.findIndex(it => (it.bucket || "older") === b);
      if (idx >= 0) goTo(idx);
    };
    strip.appendChild(btn);
  }
  container.appendChild(strip);

  const swiper = el('<div class="swiper"><div class="swiper-track"></div></div>');
  const track = swiper.querySelector(".swiper-track");
  items.forEach(it => track.appendChild(renderSwipeCard(it)));
  container.appendChild(swiper);

  const chrome = el(`
    <div class="swiper-chrome">
      <div class="swiper-dots"><span id="sw-i">1</span> / ${items.length}</div>
      <div class="swiper-nav">
        <button id="sw-prev">←</button>
        <button id="sw-next">→</button>
      </div>
    </div>
  `);
  container.appendChild(chrome);

  let idx = 0;
  const w = () => swiper.clientWidth;

  function goTo(i) {
    idx = Math.max(0, Math.min(items.length - 1, i));
    track.style.transform = `translateX(${-idx * w()}px)`;
    document.getElementById("sw-i").textContent = (idx + 1);
    document.getElementById("sw-prev").disabled = idx === 0;
    document.getElementById("sw-next").disabled = idx === items.length - 1;
  }
  window.goTo = goTo;

  document.getElementById("sw-prev").onclick = () => goTo(idx - 1);
  document.getElementById("sw-next").onclick = () => goTo(idx + 1);
  window.addEventListener("resize", () => goTo(idx));

  let startX = 0, currentX = 0, dragging = false;
  track.addEventListener("touchstart", e => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX; currentX = startX; dragging = true;
    swiper.classList.add("dragging");
  }, {passive: true});
  track.addEventListener("touchmove", e => {
    if (!dragging) return;
    currentX = e.touches[0].clientX;
    const dx = currentX - startX;
    track.style.transform = `translateX(${-idx * w() + dx}px)`;
  }, {passive: true});
  track.addEventListener("touchend", () => {
    if (!dragging) return;
    dragging = false;
    swiper.classList.remove("dragging");
    const dx = currentX - startX;
    const threshold = w() * 0.18;
    if (dx < -threshold && idx < items.length - 1) goTo(idx + 1);
    else if (dx > threshold && idx > 0) goTo(idx - 1);
    else goTo(idx);
  });

  requestAnimationFrame(() => goTo(0));
}

function renderSwipeCard(item) {
  const crops = (item.crops || "").split(",").filter(Boolean);
  const regions = (item.regions || "").split(",").filter(Boolean);
  const tags = [
    ...crops.slice(0, 3).map(c => `<span class="mag-tag">${escapeHtml(c)}</span>`),
    ...regions.slice(0, 2).map(r => `<span class="mag-tag region">${escapeHtml(r)}</span>`),
  ].join("");
  const imgHtml = item.image_url
    ? `<img class="mag-img" src="${escapeHtml(item.image_url)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'mag-img-placeholder\\'>${letterFor(item.title)}</div>'">`
    : `<div class="mag-img-placeholder">${letterFor(item.title)}</div>`;

  return el(`
    <div class="swipe-card">
      ${imgHtml}
      <div class="mag-kicker">
        <span class="source">${escapeHtml(item.source || "")}</span>
        <span class="sep"></span>
        <span class="date">${fmtDate(item.published_at)}</span>
      </div>
      <h3 class="mag-title">${escapeHtml(item.title)}</h3>
      <p class="mag-summary">${escapeHtml(item.summary || "")}</p>
      ${tags ? `<div class="mag-tags">${tags}</div>` : ""}
      <a class="read-more" href="${escapeHtml(item.link)}" target="_blank" rel="noopener">Read full story →</a>
    </div>
  `);
}

/* ==========================================================
   Pagination
========================================================== */
function renderPagination(kind) {
  const s = state[kind];
  const container = document.getElementById(kind + "-pagination");
  const totalPages = Math.max(1, Math.ceil(s.total / s.limit));
  const currentPage = Math.floor(s.offset / s.limit) + 1;
  container.innerHTML = "";
  const prev = el(`<button ${s.offset === 0 ? "disabled" : ""}>← Prev</button>`);
  const info = el(`<span class="page-info">Page ${currentPage} of ${totalPages} · ${fmtNum(s.total)} items</span>`);
  const next = el(`<button ${currentPage >= totalPages ? "disabled" : ""}>Next →</button>`);
  prev.onclick = () => {
    s.offset = Math.max(0, s.offset - s.limit);
    (kind === "companies" ? loadCompanies : loadNews)();
    window.scrollTo({top: 0, behavior: "smooth"});
  };
  next.onclick = () => {
    s.offset = s.offset + s.limit;
    (kind === "companies" ? loadCompanies : loadNews)();
    window.scrollTo({top: 0, behavior: "smooth"});
  };
  container.append(prev, info, next);
}

/* ==========================================================
   Wiring
========================================================== */
let debounceTimer;
function debounce(fn) { clearTimeout(debounceTimer); debounceTimer = setTimeout(fn, 300); }

function onFiltersChanged() {
  state.news.offset = 0;
  loadNews();
}

document.getElementById("company-search").addEventListener("input", e => {
  state.companies.q = e.target.value.trim();
  state.companies.offset = 0;
  debounce(loadCompanies);
});
document.getElementById("country-filter").addEventListener("change", e => {
  state.companies.country = e.target.value;
  state.companies.offset = 0;
  loadCompanies();
});
document.querySelectorAll(".company-chip").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".company-chip").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.companies.crop = btn.dataset.crop;
    state.companies.offset = 0;
    loadCompanies();
  });
});

document.getElementById("news-search").addEventListener("input", e => {
  state.news.q = e.target.value.trim();
  state.news.offset = 0;
  debounce(loadNews);
});
document.getElementById("date-from").addEventListener("change", e => {
  state.news.dateFrom = e.target.value;
  onFiltersChanged();
});
document.getElementById("date-to").addEventListener("change", e => {
  state.news.dateTo = e.target.value;
  onFiltersChanged();
});
document.getElementById("filter-reset").addEventListener("click", () => {
  state.news.q = ""; state.news.crops.clear(); state.news.regions.clear(); state.news.sources.clear();
  state.news.dateFrom = ""; state.news.dateTo = ""; state.news.offset = 0;
  document.getElementById("news-search").value = "";
  document.getElementById("date-from").value = "";
  document.getElementById("date-to").value = "";
  renderChips("crop-chips",   state.facets.crops,   state.news.crops);
  renderChips("region-chips", state.facets.regions, state.news.regions);
  renderChips("source-chips", state.facets.sources, state.news.sources);
  loadNews();
});

(async () => {
  await loadStats();
  loadCompanyCountries();
  await loadFacets();
  await loadNews();
})();
